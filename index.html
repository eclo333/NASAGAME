<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <!-- NASA official SVG — crisp at any resolution, no broken image -->
      <div class="logo-container">
        <a href="/" aria-label="NASA Home">
          <img
            src="img/nasa-worm-logo.png"
            onerror="this.onerror=null;this.src='https://www.nasa.gov/sites/all/themes/custom/nasatwo/images/nasa-logo.svg';"
            alt="NASA Logo"
            class="logo"
          />
        </a>
      </div>
      <h1>Space Explorer</h1>
    </header>

    <!-- Random "Did You Know?" space fact — populated by script.js -->
    <div class="space-fact">
      <span class="fact-label">🌌 Did You Know?</span>
      <span id="fact-text"></span>
    </div>

    <div class="filters">
      <div class="date-bento" aria-label="Date range">
        <input type="date" id="startDate" />
        <input type="date" id="endDate" />
      </div>
      <button id="fetchBtn">Get Space Images</button>
    </div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon telescope-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>

  <!-- Modal overlay — shown when a gallery item is clicked -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">&times;</button>
      <!-- Image shown for photo entries -->
      <img id="modalImage" src="" alt="" />
      <!-- Video container shown for video entries -->
      <div id="modalVideo" class="modal-video hidden"></div>
      <h2 id="modalTitle"></h2>
      <p id="modalDate" class="modal-date"></p>
      <p id="modalExplanation" class="modal-explanation"></p>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
